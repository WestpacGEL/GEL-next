name: Colour
cardTitle: Colour
description: >-
  Each brand within the Westpac Group uses a unique colour palette as part of
  its identity. These colours permeate every touchpoint in the customer journey.
  The correct application of these colours is critical to brand recognition and
  overall customer experience. When the palette is used incorrectly, brand
  integrity is diluted and the customer journey becomes fragmented. This article
  explains why we have a colour system, how it works, and how to apply it in
  your designs.
