name: Dark mode
cardTitle: Dark Mode
description: >-
  The introduction of tokens to the Design System enables dark mode across all
  our brands. Our colour system now supports two modes: light and dark. While
  the switch to dark mode is largely automated, there’s still some additional
  complexity for both design and development to consider. This article outlines
  the design principles and guidelines to help you work safely and effectively
  in this environment.
