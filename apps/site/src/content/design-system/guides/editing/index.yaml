name: Editing
description: >-
  Editing is a common interaction across Westpac digital experiences. Customers
  regularly update information, preferences, settings and account details.


  Without a shared approach, similar customer problems can result in different
  patterns, behaviours and implementation choices across products and platforms.
  This guidance provides a common enterprise model for designing editing
  experiences that are consistent, reusable and scalable across Westpac.
