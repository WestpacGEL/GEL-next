name: Colour tokens
description: >-
  The GEL colour system is designed to meet AA accessibility contrast standards.
  Our multi-brand colour tokens are organised around four key elements:
  background, surface, text, and border. This structure ensures that all our
  current colour pairings remain accessible in both light and dark modes. Before
  using colour tokens, always refer to these usage guidelines.
